services:
  - type: web
    name: api-pos-system
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: db_posprojecthostingg
          property: connectionString
      - key: APP_KEY
        generateValue: true

databases:
  - name: db_posprojecthostingg
    databaseName: db_posprojecthostingg
    user: db_user
    plan: free


